name: Publish to npm

on:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: npm dist-tag to publish under
        required: true
        default: latest

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Pack dry run
        run: npm pack --dry-run

      - name: Check if version is already published
        id: check_version
        run: |
          PKG_NAME=$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).name")
          PKG_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")
          if ! npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "should_publish=true" >> $GITHUB_OUTPUT
            echo "Version ${PKG_VERSION} is not published. Proceeding to publish."
          else
            echo "should_publish=false" >> $GITHUB_OUTPUT
            echo "Version ${PKG_VERSION} is already published. Skipping."
          fi

      - name: Publish
        if: steps.check_version.outputs.should_publish == 'true'
        run: npm publish --provenance --access public --tag "${NPM_TAG}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TAG: ${{ github.event.inputs.tag || 'latest' }}
